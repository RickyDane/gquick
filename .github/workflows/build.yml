name: Build

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: short

jobs:
  prepare-release:
    outputs:
      release_tag: ${{ steps.release.outputs.release_tag }}
      should_publish_release: ${{ steps.release.outputs.should_publish_release }}
      is_prerelease: ${{ steps.release.outputs.is_prerelease }}
    permissions:
      contents: write
    runs-on: ubuntu-latest
    concurrency:
      group: release-tag-${{ github.ref_name }}
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate app versions and prepare release tag
        id: release
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          package_version="$(node -p "require('./package.json').version")"
          tauri_version="$(node -p "require('./src-tauri/tauri.conf.json').version")"
          tag="v${package_version}"

          if [ "$package_version" != "$tauri_version" ]; then
            echo "::error::Version mismatch: package.json has $package_version but src-tauri/tauri.conf.json has $tauri_version. Keep them in sync so release artifact filtering finds the current Tauri bundles."
            exit 1
          fi

          echo "release_tag=" >> "$GITHUB_OUTPUT"
          echo "should_publish_release=false" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=false" >> "$GITHUB_OUTPUT"

          case "$tag" in
            *-alpha*|*-beta*|*-rc*) echo "is_prerelease=true" >> "$GITHUB_OUTPUT" ;;
          esac

          if [ "$REF_TYPE" = "tag" ]; then
            if [ "$REF_NAME" != "$tag" ]; then
              echo "::error::Tag mismatch: workflow tag is $REF_NAME but package.json version requires $tag."
              exit 1
            fi

            echo "release_tag=${tag}" >> "$GITHUB_OUTPUT"
            if [ "$EVENT_NAME" = "push" ]; then
              echo "should_publish_release=true" >> "$GITHUB_OUTPUT"
            fi
            echo "Using release tag ${tag} from tag push."
            exit 0
          fi

          if [ "$EVENT_NAME" != "push" ] || [ "$REF_TYPE" != "branch" ]; then
            echo "Validated ${tag}; non-push or non-branch run will build without publishing."
            exit 0
          fi

          git fetch --force origin "+refs/tags/${tag}:refs/tags/${tag}" || true

          if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
            tag_commit="$(git rev-list -n 1 "refs/tags/${tag}")"
            head_commit="$(git rev-parse HEAD)"
            if [ "$tag_commit" != "$head_commit" ]; then
              echo "::error::Release tag ${tag} already exists but points to ${tag_commit}, not current HEAD ${head_commit}. Bump version or move the tag intentionally outside this workflow."
              exit 1
            fi
            echo "Release tag ${tag} already exists on current HEAD; publishing from this workflow run."
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag -a "$tag" -m "Release ${tag}"
            git push origin "$tag"
            echo "Created and pushed release tag ${tag} from ${BRANCH_NAME}; publishing from this workflow run."
          fi

          echo "release_tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "should_publish_release=true" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare-release
    if: github.event_name != 'push' || needs.prepare-release.outputs.release_tag != '' || github.ref_type == 'branch'
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            os_name: linux
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            os_name: windows
          - platform: macos-latest
            target: aarch64-apple-darwin
            os_name: macos-arm

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate app versions match
        id: validate_versions
        shell: bash
        env:
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          package_version="$(node -p "require('./package.json').version")"
          tauri_version="$(node -p "require('./src-tauri/tauri.conf.json').version")"
          expected_tag="v${package_version}"

          if [ "$package_version" != "$tauri_version" ]; then
            echo "::error::Version mismatch: package.json has $package_version but src-tauri/tauri.conf.json has $tauri_version. Keep them in sync so release artifact filtering finds the current Tauri bundles."
            exit 1
          fi

          if [ "$REF_TYPE" = "tag" ] && [ "$REF_NAME" != "$expected_tag" ]; then
            echo "::error::Tag mismatch: workflow tag is $REF_NAME but package.json version requires $expected_tag."
            exit 1
          fi

          echo "package_version=${package_version}" >> "$GITHUB_OUTPUT"
          echo "tag=${expected_tag}" >> "$GITHUB_OUTPUT"
          echo "Validated release version: $package_version"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            src-tauri/target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      # ------------------------------------------------------------------
      # Platform-specific system dependencies
      # ------------------------------------------------------------------

      - name: Install Linux dependencies
        if: matrix.os_name == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libdbus-1-dev \
            libpipewire-0.3-dev \
            libwayland-dev \
            libegl-dev \
            libgbm-dev \
            libclang-dev \
            clang

      - name: Install macOS dependencies (ARM64)
        if: matrix.os_name == 'macos-arm'
        run: |
          brew install tesseract
          mkdir -p src-tauri/macos-bundle/Frameworks src-tauri/macos-bundle/tessdata

      - name: Install Windows dependencies
        if: matrix.os_name == 'windows'
        run: |
          echo "No additional system dependencies required for Windows"

      # ------------------------------------------------------------------
      # Build application
      # ------------------------------------------------------------------

      - name: Install frontend dependencies
        run: npm ci

      - name: Clean cached bundle artifacts
        shell: bash
        run: |
          rm -rf "src-tauri/target/${{ matrix.target }}/release/bundle"
          rm -rf "src-tauri/target/release/bundle"
          rm -rf "release-artifacts/${{ matrix.os_name }}"

      - name: Debug signing secret access
        if: matrix.os_name == 'macos-arm'
        env:
          HAS_APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE != '' }}
          HAS_APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD != '' }}
          HAS_APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY != '' }}
          HAS_APPLE_ID: ${{ secrets.APPLE_ID != '' }}
          HAS_APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD != '' }}
          HAS_APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID != '' }}
        run: |
          echo "Event: ${{ github.event_name }}"
          echo "Ref: ${{ github.ref }}"
          echo "Repository: ${{ github.repository }}"
          echo "Environment: Configure Tauri v2.0"
          echo "APPLE_CERTIFICATE present: $HAS_APPLE_CERTIFICATE"
          echo "APPLE_CERTIFICATE_PASSWORD present: $HAS_APPLE_CERTIFICATE_PASSWORD"
          echo "APPLE_SIGNING_IDENTITY present: $HAS_APPLE_SIGNING_IDENTITY"
          echo "APPLE_ID present: $HAS_APPLE_ID"
          echo "APPLE_PASSWORD present: $HAS_APPLE_PASSWORD"
          echo "APPLE_TEAM_ID present: $HAS_APPLE_TEAM_ID"

      - name: Validate macOS signing certificate
        if: matrix.os_name == 'macos-arm'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          SHOULD_PUBLISH_RELEASE: ${{ needs.prepare-release.outputs.should_publish_release }}
        run: |
          missing_secrets=()
          for secret_name in APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD APPLE_SIGNING_IDENTITY; do
            if [ -z "${!secret_name:-}" ]; then
              missing_secrets+=("$secret_name")
            fi
          done

          if [ ${#missing_secrets[@]} -gt 0 ]; then
            if [ "$SHOULD_PUBLISH_RELEASE" = "true" ] && [ "${{ github.event_name }}" = "push" ]; then
              echo "::error::Apple signing secrets are missing for release build: ${missing_secrets[*]}. Refusing to build unsigned macOS release artifacts."
              exit 1
            fi
            echo "::warning::Apple signing secrets are missing (${missing_secrets[*]}). Skipping code signing validation for non-release build."
            echo "signing_available=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "$APPLE_CERTIFICATE" | base64 -d -o /tmp/certificate.p12
          if [ ! -s /tmp/certificate.p12 ]; then
            echo "::error::Decoded certificate is empty. Base64 string may be invalid."
            exit 1
          fi
          echo "Certificate decoded successfully ($(stat -f%z /tmp/certificate.p12) bytes)"

          # Try importing into a temporary keychain to verify password and content
          KEYCHAIN_PATH=/tmp/gquick-build.keychain
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"

          if ! security import /tmp/certificate.p12 -P "$APPLE_CERTIFICATE_PASSWORD" -k "$KEYCHAIN_PATH" -T /usr/bin/codesign -T /usr/bin/security; then
            echo "::error::Failed to import certificate. Common causes: wrong password, missing private key, or corrupted .p12 file."
            exit 1
          fi

          echo "Certificate imported successfully. Available identities:"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

          if [ -n "$APPLE_SIGNING_IDENTITY" ]; then
            if security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep -q "$APPLE_SIGNING_IDENTITY"; then
              echo "Signing identity '$APPLE_SIGNING_IDENTITY' found ✓"
            else
              echo "::warning::Signing identity '$APPLE_SIGNING_IDENTITY' not found in keychain."
            fi
          fi
          echo "signing_available=true" >> "$GITHUB_OUTPUT"
        id: validate_cert

      - name: Build Tauri app
        run: npm run tauri -- build --target ${{ matrix.target }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ matrix.os_name == 'macos-arm' && secrets.APPLE_CERTIFICATE || '' }}
          APPLE_CERTIFICATE_PASSWORD: ${{ matrix.os_name == 'macos-arm' && secrets.APPLE_CERTIFICATE_PASSWORD || '' }}
          APPLE_SIGNING_IDENTITY: ${{ matrix.os_name == 'macos-arm' && secrets.APPLE_SIGNING_IDENTITY || '' }}
          APPLE_ID: ${{ matrix.os_name == 'macos-arm' && secrets.APPLE_ID || '' }}
          APPLE_PASSWORD: ${{ matrix.os_name == 'macos-arm' && secrets.APPLE_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ matrix.os_name == 'macos-arm' && secrets.APPLE_TEAM_ID || '' }}

      - name: Verify and notarize macOS DMG
        if: matrix.os_name == 'macos-arm'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          SHOULD_PUBLISH_RELEASE: ${{ needs.prepare-release.outputs.should_publish_release }}
        run: |
          set -euo pipefail

          missing_secrets=()
          for secret_name in APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD APPLE_SIGNING_IDENTITY APPLE_ID APPLE_PASSWORD APPLE_TEAM_ID; do
            if [ -z "${!secret_name:-}" ]; then
              missing_secrets+=("$secret_name")
            fi
          done

          version="$(node -p "require('./package.json').version")"
          bundle_roots=(
            "src-tauri/target/${{ matrix.target }}/release/bundle"
            "src-tauri/target/release/bundle"
          )
          app_bundles=()
          all_dmg_files=()
          dmg_files=()
          mismatched_dmg_files=()

          escaped_version="$(VERSION="$version" node -e 'process.stdout.write(process.env.VERSION.replace(/[.*+?^${}()|[\]\\]/g, "\\$&"))')"
          # Tauri DMG names use the app name, exact version, optional arch, then .dmg
          # (for example: GQuick_0.1.6_aarch64.dmg). Do not treat '-' after a
          # stable version as a delimiter, because that would match prereleases.
          version_regex="(^|[_-])${escaped_version}(_(aarch64|x64|universal))?\.dmg$"

          print_bundle_root_listing() {
            echo "Full cleaned Tauri bundle root listing:"
            for bundle_root in "${bundle_roots[@]}"; do
              if [ -d "$bundle_root" ]; then
                echo "Bundle root exists: $bundle_root"
                find "$bundle_root" -print | sort
              else
                echo "Bundle root missing: $bundle_root"
              fi
            done
          }

          echo "Inspecting cleaned Tauri bundle roots for macOS artifacts:"
          for bundle_root in "${bundle_roots[@]}"; do
            if [ -d "$bundle_root" ]; then
              echo "Bundle root exists: $bundle_root"

              while IFS= read -r app_bundle; do
                app_bundles+=("$app_bundle")
              done < <(find "$bundle_root" -name '*.app' -type d -prune -print | sort)

              while IFS= read -r dmg_file; do
                all_dmg_files+=("$dmg_file")
                dmg_basename="$(basename "$dmg_file")"
                if [[ "$dmg_basename" =~ $version_regex ]]; then
                  dmg_files+=("$dmg_file")
                else
                  mismatched_dmg_files+=("$dmg_file")
                fi
              done < <(find "$bundle_root" -type f -name '*.dmg' -print | sort)
            else
              echo "Bundle root missing: $bundle_root"
            fi
          done

          echo "Discovered macOS app bundles (${#app_bundles[@]}):"
          for app in "${app_bundles[@]}"; do
            echo "  $app"
          done

          echo "Discovered macOS DMG files (${#all_dmg_files[@]}):"
          for dmg in "${all_dmg_files[@]}"; do
            echo "  $dmg"
          done

          echo "Current-version DMG matches for version ${version} (${#dmg_files[@]}):"
          for dmg in "${dmg_files[@]}"; do
            echo "  $dmg"
          done

          if [ ${#mismatched_dmg_files[@]} -gt 0 ]; then
            echo "::error::Found macOS .dmg file(s) that do not strictly match current version ${version}. Refusing to continue because staging could publish stale or mismatched artifacts. Expected Tauri DMG filename version pattern: ${version_regex}"
            echo "Mismatched DMG files:"
            for dmg in "${mismatched_dmg_files[@]}"; do
              echo "  $dmg"
            done
            print_bundle_root_listing
            exit 1
          fi

          if [ ${#missing_secrets[@]} -gt 0 ]; then
            if [ "$SHOULD_PUBLISH_RELEASE" = "true" ] && [ "${{ github.event_name }}" = "push" ]; then
              echo "::error::Apple signing/notarization secrets are missing for release build: ${missing_secrets[*]}. Refusing to publish unnotarized macOS DMG."
              exit 1
            fi
            echo "::warning::Apple signing/notarization secrets are missing (${missing_secrets[*]}). Skipping final DMG notarization for non-release build."
            exit 0
          fi

          if [ ${#app_bundles[@]} -eq 0 ]; then
            echo "::error::No macOS .app bundle found to verify in cleaned bundle roots."
            print_bundle_root_listing
            exit 1
          fi

          if [ ${#dmg_files[@]} -eq 0 ]; then
            if [ ${#all_dmg_files[@]} -eq 0 ]; then
              echo "::error::No macOS .dmg files found to notarize in cleaned bundle roots."
            else
              echo "::error::Found macOS .dmg file(s), but none strictly match current version ${version}. Refusing to notarize stale or mismatched artifacts. Expected Tauri DMG filename version pattern: ${version_regex}"
              echo "DMG filenames found:"
              for dmg in "${all_dmg_files[@]}"; do
                echo "  $(basename "$dmg")"
              done
            fi
            print_bundle_root_listing
            exit 1
          fi

          for app in "${app_bundles[@]}"; do
            echo "Verifying app bundle signature: $app"
            codesign --verify --deep --strict --verbose=4 "$app"
            spctl -a -vvv -t exec "$app" || echo "::warning::spctl app assessment did not pass before final DMG notarization: $app"
          done

          signed_app="${app_bundles[0]}"
          for dmg in "${dmg_files[@]}"; do
            echo "Recreating DMG from verified signed app bundle: $dmg"
            staging_dir="$(mktemp -d)"
            ditto "$signed_app" "$staging_dir/$(basename "$signed_app")"
            ln -s /Applications "$staging_dir/Applications"
            rm -f "$dmg"
            hdiutil create \
              -volname "GQuick" \
              -srcfolder "$staging_dir" \
              -ov \
              -format UDZO \
              "$dmg"
            rm -rf "$staging_dir"
          done

          for dmg in "${dmg_files[@]}"; do
            echo "Signing DMG: $dmg"
            codesign --force --timestamp --sign "$APPLE_SIGNING_IDENTITY" "$dmg"

            echo "Submitting DMG for notarization: $dmg"
            notary_output="$(mktemp)"
            set +e
            xcrun notarytool submit "$dmg" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              --wait 2>&1 | tee "$notary_output"
            notary_exit=${PIPESTATUS[0]}
            set -e

            submission_id="$(sed -nE 's/^[[:space:]]*id:[[:space:]]*([A-Fa-f0-9-]{36}).*/\1/p' "$notary_output" | sed -n '1p')"
            if [ -n "$submission_id" ]; then
              echo "Notary submission ID: $submission_id"
            else
              echo "::warning::Could not extract notary submission ID from notarytool output."
            fi

            if [ "$notary_exit" -ne 0 ] || grep -qiE '^[[:space:]]*status:[[:space:]]*Invalid' "$notary_output"; then
              echo "::error::Apple notarization failed for DMG: $dmg"
              if [ -n "$submission_id" ]; then
                echo "Fetching Apple notary log for submission: $submission_id"
                xcrun notarytool log "$submission_id" \
                  --apple-id "$APPLE_ID" \
                  --password "$APPLE_PASSWORD" \
                  --team-id "$APPLE_TEAM_ID" || true
              fi
              exit 1
            fi

            if ! grep -qiE '^[[:space:]]*status:[[:space:]]*Accepted' "$notary_output"; then
              echo "::error::Apple notarization did not report Accepted status for DMG: $dmg"
              if [ -n "$submission_id" ]; then
                echo "Fetching Apple notary log for submission: $submission_id"
                xcrun notarytool log "$submission_id" \
                  --apple-id "$APPLE_ID" \
                  --password "$APPLE_PASSWORD" \
                  --team-id "$APPLE_TEAM_ID" || true
              fi
              exit 1
            fi

            echo "Stapling notarization ticket to DMG: $dmg"
            xcrun stapler staple "$dmg"
            xcrun stapler validate "$dmg"

            echo "Validating Gatekeeper assessment for DMG: $dmg"
            spctl -a -vvv -t open --context context:primary-signature "$dmg"
          done

      - name: Stage current build artifacts
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');

          const sourceRoots = [
            path.join('src-tauri', 'target', '${{ matrix.target }}', 'release', 'bundle'),
            path.join('src-tauri', 'target', 'release', 'bundle'),
          ];
          const outputRoot = path.join('release-artifacts', '${{ matrix.os_name }}');
          const allowedPatterns = [
            /\.dmg$/,
            /\.msi$/,
            /\.exe$/,
            /\.deb$/,
            /\.rpm$/,
            /\.AppImage$/,
            /\.AppImage\.sig$/,
            /\.AppImage\.tar\.gz$/,
            /\.AppImage\.tar\.gz\.sig$/,
            /\.msi\.sig$/,
            /\.exe\.sig$/,
            /\.nsis\.zip$/,
            /\.nsis\.zip\.sig$/,
            /\.app\.tar\.gz$/,
            /\.app\.tar\.gz\.sig$/,
          ];

          function walk(dir) {
            if (!fs.existsSync(dir)) return [];
            return fs.readdirSync(dir, { withFileTypes: true }).flatMap((entry) => {
              const fullPath = path.join(dir, entry.name);
              return entry.isDirectory() ? walk(fullPath) : [fullPath];
            });
          }

          fs.rmSync(outputRoot, { recursive: true, force: true });
          fs.mkdirSync(outputRoot, { recursive: true });

          const artifacts = sourceRoots.flatMap(walk).filter((file) => {
            const normalized = file.split(path.sep).join('/');
            return allowedPatterns.some((pattern) => pattern.test(normalized));
          });

          if (artifacts.length === 0) {
            console.error(`No releasable artifacts found in ${sourceRoots.join(', ')}`);
            process.exit(1);
          }

          const destinations = new Map();
          for (const artifact of artifacts) {
            const destination = path.join(outputRoot, path.basename(artifact));
            const existing = destinations.get(destination);
            if (existing) {
              console.error(`Duplicate staged artifact destination: ${destination}`);
              console.error(`  ${existing}`);
              console.error(`  ${artifact}`);
              process.exit(1);
            }
            destinations.set(destination, artifact);
          }

          for (const artifact of artifacts) {
            const destination = path.join(outputRoot, path.basename(artifact));
            fs.copyFileSync(artifact, destination);
            console.log(`Staged ${artifact} -> ${destination}`);
          }
          NODE

      # ------------------------------------------------------------------
      # Upload artifacts (CI builds)
      # ------------------------------------------------------------------

      - name: Upload build artifacts
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: gquick-${{ matrix.os_name }}
          path: release-artifacts/${{ matrix.os_name }}/*
          if-no-files-found: error

      # ------------------------------------------------------------------
      # Release artifacts are published once by publish-release after matrix builds finish.
      # ------------------------------------------------------------------

  publish-release:
    if: github.event_name == 'push' && needs.prepare-release.outputs.should_publish_release == 'true' && needs.prepare-release.outputs.release_tag != ''
    needs:
      - prepare-release
      - build
    permissions:
      contents: write
    concurrency:
      group: release-mutate-${{ needs.prepare-release.outputs.release_tag }}
      cancel-in-progress: false
    runs-on: ubuntu-latest
    steps:
      - name: Download staged build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: gquick-*
          path: artifacts
          merge-multiple: false

      - name: Validate release artifact names
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');

          function walk(dir) {
            if (!fs.existsSync(dir)) return [];
            return fs.readdirSync(dir, { withFileTypes: true }).flatMap((entry) => {
              const fullPath = path.join(dir, entry.name);
              return entry.isDirectory() ? walk(fullPath) : [fullPath];
            });
          }

          const files = walk('artifacts');
          if (files.length === 0) {
            console.error('No downloaded release artifacts found.');
            process.exit(1);
          }

          const byName = new Map();
          for (const file of files) {
            const basename = path.basename(file);
            const existing = byName.get(basename);
            if (existing) {
              console.error(`Duplicate release artifact basename: ${basename}`);
              console.error(`  ${existing}`);
              console.error(`  ${file}`);
              process.exit(1);
            }
            byName.set(basename, file);
          }

          fs.rmSync('publish-artifacts', { recursive: true, force: true });
          fs.mkdirSync('publish-artifacts', { recursive: true });
          for (const [basename, file] of byName) {
            fs.copyFileSync(file, path.join('publish-artifacts', basename));
            console.log(`Prepared ${file} -> publish-artifacts/${basename}`);
          }
          NODE

      - name: Delete existing release assets
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.prepare-release.outputs.release_tag }}
        run: |
          set -euo pipefail

          release_json="$(gh release view "$RELEASE_TAG" --json assets 2>/dev/null || true)"
          if [ -z "$release_json" ]; then
            echo "Release ${RELEASE_TAG} does not exist yet; no assets to delete."
            exit 0
          fi

          asset_ids="$(printf '%s' "$release_json" | jq -r '.assets[].databaseId')"
          if [ -z "$asset_ids" ]; then
            echo "Release ${RELEASE_TAG} has no existing assets."
            exit 0
          fi

          while IFS= read -r asset_id; do
            if [ -n "$asset_id" ]; then
              echo "Deleting existing release asset ${asset_id}"
              gh api --method DELETE "repos/${{ github.repository }}/releases/assets/${asset_id}"
            fi
          done <<< "$asset_ids"

      - name: Publish draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: ${{ needs.prepare-release.outputs.is_prerelease == 'true' }}
          name: GQuick ${{ needs.prepare-release.outputs.release_tag }}
          tag_name: ${{ needs.prepare-release.outputs.release_tag }}
          generate_release_notes: true
          files: publish-artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ------------------------------------------------------------------
  # Generate latest.json for Tauri updater
  # ------------------------------------------------------------------
  generate-latest-json:
    if: github.event_name == 'push' && needs.prepare-release.outputs.should_publish_release == 'true' && needs.prepare-release.outputs.release_tag != ''
    needs:
      - prepare-release
      - publish-release
    permissions:
      contents: write
    concurrency:
      group: release-mutate-${{ needs.prepare-release.outputs.release_tag }}
      cancel-in-progress: false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Determine version
        id: version
        run: |
          VERSION="${{ needs.prepare-release.outputs.release_tag }}"
          echo "tag=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION#v}" >> "$GITHUB_OUTPUT"

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: gquick-*
          path: artifacts
          merge-multiple: false

      - name: Validate latest.json artifact names
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');

          function walk(dir) {
            if (!fs.existsSync(dir)) return [];
            return fs.readdirSync(dir, { withFileTypes: true }).flatMap((entry) => {
              const fullPath = path.join(dir, entry.name);
              return entry.isDirectory() ? walk(fullPath) : [fullPath];
            });
          }

          const files = walk('artifacts');
          if (files.length === 0) {
            console.error('No downloaded artifacts found for latest.json.');
            process.exit(1);
          }

          const byName = new Map();
          for (const file of files) {
            const basename = path.basename(file);
            const existing = byName.get(basename);
            if (existing) {
              console.error(`Duplicate artifact basename for latest.json: ${basename}`);
              console.error(`  ${existing}`);
              console.error(`  ${file}`);
              process.exit(1);
            }
            byName.set(basename, file);
          }

          console.log(`Validated ${files.length} downloaded artifact files with unique basenames.`);
          NODE

      - name: Generate latest.json
        id: latest
        run: |
          set -euo pipefail

          node <<'NODE'
          const fs = require('fs');
          const path = require('path');

          const tag = '${{ steps.version.outputs.tag }}';
          const version = '${{ steps.version.outputs.version }}';
          const pubDate = new Date().toISOString().replace(/\.\d{3}Z$/, 'Z');
          const baseUrl = `https://github.com/${{ github.repository }}/releases/download/${tag}`;

          const expectedBundles = [
            { platform: 'darwin-aarch64', bundlePattern: /\.app\.tar\.gz$/, sigPattern: /\.app\.tar\.gz\.sig$/ },
            { platform: 'linux-x86_64', bundlePattern: /\.AppImage\.tar\.gz$/, sigPattern: /\.AppImage\.tar\.gz\.sig$/ },
            { platform: 'windows-x86_64', bundlePattern: /\.nsis\.zip$/, sigPattern: /\.nsis\.zip\.sig$/ },
          ];

          function walk(dir) {
            if (!fs.existsSync(dir)) return [];
            return fs.readdirSync(dir, { withFileTypes: true }).flatMap((entry) => {
              const fullPath = path.join(dir, entry.name);
              return entry.isDirectory() ? walk(fullPath) : [fullPath];
            });
          }

          const files = walk('artifacts');
          const byBasename = new Map(files.map((file) => [path.basename(file), file]));
          const platforms = {};

          for (const { platform, bundlePattern, sigPattern } of expectedBundles) {
            const bundles = files.filter((file) => bundlePattern.test(path.basename(file)));
            if (bundles.length !== 1) {
              console.error(`Expected exactly one ${platform} updater bundle matching ${bundlePattern}, found ${bundles.length}.`);
              for (const bundle of bundles) console.error(`  ${bundle}`);
              process.exit(1);
            }

            const signatures = files.filter((file) => sigPattern.test(path.basename(file)));
            if (signatures.length !== 1) {
              console.error(`Expected exactly one ${platform} updater signature matching ${sigPattern}, found ${signatures.length}.`);
              for (const signature of signatures) console.error(`  ${signature}`);
              process.exit(1);
            }

            const bundle = bundles[0];
            const bundleName = path.basename(bundle);
            const sigName = `${bundleName}.sig`;
            const sigPath = byBasename.get(sigName);
            if (!sigPath) {
              console.error(`Missing updater signature pair for ${platform}: expected ${sigName}.`);
              process.exit(1);
            }

            platforms[platform] = {
              signature: fs.readFileSync(sigPath, 'utf8').trim(),
              url: `${baseUrl}/${encodeURIComponent(bundleName)}`,
            };
            console.log(`Found ${platform} updater bundle: ${bundleName}`);
          }

          const latest = {
            version,
            notes: 'See release notes for details',
            pub_date: pubDate,
            platforms,
          };

          fs.writeFileSync('latest.json', `${JSON.stringify(latest, null, 2)}\n`);
          console.log('Generated latest.json:');
          console.log(JSON.stringify(latest, null, 2));
          NODE

          jq . latest.json

      - name: Upload latest.json to release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          tag_name: ${{ steps.version.outputs.tag }}
          files: latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ------------------------------------------------------------------
  # GitHub Pages — deploy website on push to main/master
  # ------------------------------------------------------------------
  deploy-pages:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    needs: prepare-release
    permissions:
      contents: read
      pages: write
      id-token: write
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
