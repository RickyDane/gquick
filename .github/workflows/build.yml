name: Build

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: short

jobs:
  build:
    environment:
      name: Tauri v2.0
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            os_name: linux
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            os_name: windows
          - platform: macos-latest
            target: aarch64-apple-darwin
            os_name: macos-arm

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create version tag
        if: github.event_name == 'push' && github.ref_type == 'branch'
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v${VERSION}"
          echo "VERSION=${TAG}" >> "$GITHUB_OUTPUT"

          # Check if tag exists locally or on remote
          if git rev-parse "$TAG" >/dev/null 2>&1 || git ls-remote --tags origin "$TAG" | grep -q "$TAG"; then
            echo "Tag ${TAG} already exists, skipping creation."
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag -a "$TAG" -m "Release ${TAG}"
            git push origin "$TAG"
            echo "Created and pushed tag ${TAG}"
          fi
        id: create_tag

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            src-tauri/target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      # ------------------------------------------------------------------
      # Platform-specific system dependencies
      # ------------------------------------------------------------------

      - name: Install Linux dependencies
        if: matrix.os_name == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libdbus-1-dev \
            libpipewire-0.3-dev \
            libwayland-dev \
            libegl-dev \
            libgbm-dev \
            libclang-dev \
            clang

      - name: Install macOS dependencies (ARM64)
        if: matrix.os_name == 'macos-arm'
        run: |
          brew install tesseract
          mkdir -p src-tauri/macos-bundle/Frameworks src-tauri/macos-bundle/tessdata

      - name: Install Windows dependencies
        if: matrix.os_name == 'windows'
        run: |
          echo "No additional system dependencies required for Windows"

      # ------------------------------------------------------------------
      # Build application
      # ------------------------------------------------------------------

      - name: Install frontend dependencies
        run: npm ci

      - name: Debug signing secret access
        if: matrix.os_name == 'macos-arm'
        env:
          HAS_APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE != '' }}
          HAS_APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD != '' }}
          HAS_APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY != '' }}
          HAS_APPLE_ID: ${{ secrets.APPLE_ID != '' }}
          HAS_APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD != '' }}
          HAS_APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID != '' }}
        run: |
          echo "Event: ${{ github.event_name }}"
          echo "Ref: ${{ github.ref }}"
          echo "Repository: ${{ github.repository }}"
          echo "Environment: Configure Tauri v2.0"
          echo "APPLE_CERTIFICATE present: $HAS_APPLE_CERTIFICATE"
          echo "APPLE_CERTIFICATE_PASSWORD present: $HAS_APPLE_CERTIFICATE_PASSWORD"
          echo "APPLE_SIGNING_IDENTITY present: $HAS_APPLE_SIGNING_IDENTITY"
          echo "APPLE_ID present: $HAS_APPLE_ID"
          echo "APPLE_PASSWORD present: $HAS_APPLE_PASSWORD"
          echo "APPLE_TEAM_ID present: $HAS_APPLE_TEAM_ID"

      - name: Validate macOS signing certificate
        if: matrix.os_name == 'macos-arm'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          if [ -z "$APPLE_CERTIFICATE" ]; then
            echo "::warning::APPLE_CERTIFICATE is empty. Skipping code signing validation."
            echo "signing_available=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "$APPLE_CERTIFICATE" | base64 -d -o /tmp/certificate.p12
          if [ ! -s /tmp/certificate.p12 ]; then
            echo "::error::Decoded certificate is empty. Base64 string may be invalid."
            exit 1
          fi
          echo "Certificate decoded successfully ($(stat -f%z /tmp/certificate.p12) bytes)"

          # Try importing into a temporary keychain to verify password and content
          KEYCHAIN_PATH=/tmp/gquick-build.keychain
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"

          if ! security import /tmp/certificate.p12 -P "$APPLE_CERTIFICATE_PASSWORD" -k "$KEYCHAIN_PATH" -T /usr/bin/codesign -T /usr/bin/security; then
            echo "::error::Failed to import certificate. Common causes: wrong password, missing private key, or corrupted .p12 file."
            exit 1
          fi

          echo "Certificate imported successfully. Available identities:"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

          if [ -n "$APPLE_SIGNING_IDENTITY" ]; then
            if security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep -q "$APPLE_SIGNING_IDENTITY"; then
              echo "Signing identity '$APPLE_SIGNING_IDENTITY' found ✓"
            else
              echo "::warning::Signing identity '$APPLE_SIGNING_IDENTITY' not found in keychain."
            fi
          fi
          echo "signing_available=true" >> "$GITHUB_OUTPUT"
        id: validate_cert

      - name: Build Tauri app
        run: npm run tauri -- build --target ${{ matrix.target }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ matrix.os_name == 'macos-arm' && secrets.APPLE_CERTIFICATE || '' }}
          APPLE_CERTIFICATE_PASSWORD: ${{ matrix.os_name == 'macos-arm' && secrets.APPLE_CERTIFICATE_PASSWORD || '' }}
          APPLE_SIGNING_IDENTITY: ${{ matrix.os_name == 'macos-arm' && secrets.APPLE_SIGNING_IDENTITY || '' }}
          APPLE_ID: ${{ matrix.os_name == 'macos-arm' && secrets.APPLE_ID || '' }}
          APPLE_PASSWORD: ${{ matrix.os_name == 'macos-arm' && secrets.APPLE_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ matrix.os_name == 'macos-arm' && secrets.APPLE_TEAM_ID || '' }}

      - name: Verify and notarize macOS DMG
        if: matrix.os_name == 'macos-arm'
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail

          if [ -z "${APPLE_SIGNING_IDENTITY:-}" ] || [ -z "${APPLE_ID:-}" ] || [ -z "${APPLE_PASSWORD:-}" ] || [ -z "${APPLE_TEAM_ID:-}" ]; then
            echo "::warning::Apple signing/notarization secrets are missing. Skipping final DMG notarization."
            exit 0
          fi

          shopt -s nullglob
          app_bundles=(src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app)
          dmg_files=(src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg)

          if [ ${#app_bundles[@]} -eq 0 ]; then
            echo "::error::No macOS .app bundle found to verify."
            exit 1
          fi

          if [ ${#dmg_files[@]} -eq 0 ]; then
            echo "::error::No macOS .dmg files found to notarize."
            exit 1
          fi

          for app in "${app_bundles[@]}"; do
            echo "Verifying app bundle signature: $app"
            codesign --verify --deep --strict --verbose=4 "$app"
            spctl -a -vvv -t exec "$app" || echo "::warning::spctl app assessment did not pass before final DMG notarization: $app"
          done

          signed_app="${app_bundles[0]}"
          for dmg in "${dmg_files[@]}"; do
            echo "Recreating DMG from verified signed app bundle: $dmg"
            staging_dir="$(mktemp -d)"
            ditto "$signed_app" "$staging_dir/$(basename "$signed_app")"
            ln -s /Applications "$staging_dir/Applications"
            rm -f "$dmg"
            hdiutil create \
              -volname "GQuick" \
              -srcfolder "$staging_dir" \
              -ov \
              -format UDZO \
              "$dmg"
            rm -rf "$staging_dir"
          done

          for dmg in "${dmg_files[@]}"; do
            echo "Signing DMG: $dmg"
            codesign --force --timestamp --sign "$APPLE_SIGNING_IDENTITY" "$dmg"

            echo "Submitting DMG for notarization: $dmg"
            notary_output="$(mktemp)"
            set +e
            xcrun notarytool submit "$dmg" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              --wait 2>&1 | tee "$notary_output"
            notary_exit=${PIPESTATUS[0]}
            set -e

            submission_id="$(sed -nE 's/^[[:space:]]*id:[[:space:]]*([A-Fa-f0-9-]{36}).*/\1/p' "$notary_output" | sed -n '1p')"
            if [ -n "$submission_id" ]; then
              echo "Notary submission ID: $submission_id"
            else
              echo "::warning::Could not extract notary submission ID from notarytool output."
            fi

            if [ "$notary_exit" -ne 0 ] || grep -qiE '^[[:space:]]*status:[[:space:]]*Invalid' "$notary_output"; then
              echo "::error::Apple notarization failed for DMG: $dmg"
              if [ -n "$submission_id" ]; then
                echo "Fetching Apple notary log for submission: $submission_id"
                xcrun notarytool log "$submission_id" \
                  --apple-id "$APPLE_ID" \
                  --password "$APPLE_PASSWORD" \
                  --team-id "$APPLE_TEAM_ID" || true
              fi
              exit 1
            fi

            if ! grep -qiE '^[[:space:]]*status:[[:space:]]*Accepted' "$notary_output"; then
              echo "::error::Apple notarization did not report Accepted status for DMG: $dmg"
              if [ -n "$submission_id" ]; then
                echo "Fetching Apple notary log for submission: $submission_id"
                xcrun notarytool log "$submission_id" \
                  --apple-id "$APPLE_ID" \
                  --password "$APPLE_PASSWORD" \
                  --team-id "$APPLE_TEAM_ID" || true
              fi
              exit 1
            fi

            echo "Stapling notarization ticket to DMG: $dmg"
            xcrun stapler staple "$dmg"
            xcrun stapler validate "$dmg"

            echo "Validating Gatekeeper assessment for DMG: $dmg"
            spctl -a -vvv -t open --context context:primary-signature "$dmg"
          done

      # ------------------------------------------------------------------
      # Upload artifacts (CI builds)
      # ------------------------------------------------------------------

      - name: Upload build artifacts
        if: github.ref_type != 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: gquick-${{ matrix.os_name }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.deb
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.rpm
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage.tar.gz
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage.tar.gz.sig
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg.sig
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi.sig
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.exe.sig
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.nsis.zip
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.nsis.zip.sig
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz.sig
          if-no-files-found: warn

      # ------------------------------------------------------------------
      # Release (tag builds + auto-tagged main builds)
      # ------------------------------------------------------------------

      - name: Create draft release
        if: github.event_name == 'push' && github.ref_type != 'pull_request'
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: ${{ contains(steps.create_tag.outputs.VERSION, '-beta') || contains(steps.create_tag.outputs.VERSION, '-alpha') || contains(steps.create_tag.outputs.VERSION, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') || contains(github.ref_name, '-rc') }}
          name: GQuick ${{ steps.create_tag.outputs.VERSION || github.ref_name }}
          tag_name: ${{ steps.create_tag.outputs.VERSION || github.ref_name }}
          generate_release_notes: true
          files: |
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.deb
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.rpm
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage.tar.gz
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage.tar.gz.sig
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg.sig
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi.sig
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.exe.sig
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.nsis.zip
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.nsis.zip.sig
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz.sig
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ------------------------------------------------------------------
  # Generate latest.json for Tauri updater
  # ------------------------------------------------------------------
  generate-latest-json:
    if: github.event_name == 'push' && github.ref_type != 'pull_request'
    needs: build
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="v$(node -p "require('./package.json').version")"
          fi
          echo "tag=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION#v}" >> "$GITHUB_OUTPUT"

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate latest.json
        id: latest
        run: |
          set -euo pipefail

          TAG="${{ steps.version.outputs.tag }}"
          VERSION="${{ steps.version.outputs.version }}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          REPO="${{ github.repository }}"
          BASE_URL="https://github.com/${REPO}/releases/download/${TAG}"

          echo "Generating latest.json for ${TAG}..."

          # Find .sig files and their corresponding update bundles
          declare -A PLATFORM_MAP
          PLATFORM_MAP["darwin-aarch64"]=""
          PLATFORM_MAP["darwin-x86_64"]=""
          PLATFORM_MAP["linux-x86_64"]=""
          PLATFORM_MAP["windows-x86_64"]=""

          # macOS: look for .app.tar.gz and .app.tar.gz.sig
          MAC_SIG=$(find artifacts -name "*.app.tar.gz.sig" -type f | head -1)
          MAC_BUNDLE=$(find artifacts -name "*.app.tar.gz" -not -name "*.sig" -type f | head -1)
          if [ -n "$MAC_SIG" ] && [ -n "$MAC_BUNDLE" ]; then
            SIG_CONTENT=$(cat "$MAC_SIG")
            BUNDLE_NAME=$(basename "$MAC_BUNDLE")
            PLATFORM_MAP["darwin-aarch64"]="$(cat <<EOF
            "darwin-aarch64": {
              "signature": "${SIG_CONTENT}",
              "url": "${BASE_URL}/${BUNDLE_NAME}"
            }
          EOF
            )"
            echo "Found macOS update bundle: ${BUNDLE_NAME}"
          else
            echo "::warning::No macOS update bundle found"
          fi

          # Linux: look for .AppImage.tar.gz and .AppImage.tar.gz.sig
          LINUX_SIG=$(find artifacts -name "*.AppImage.tar.gz.sig" -type f | head -1)
          LINUX_BUNDLE=$(find artifacts -name "*.AppImage.tar.gz" -not -name "*.sig" -type f | head -1)
          if [ -n "$LINUX_SIG" ] && [ -n "$LINUX_BUNDLE" ]; then
            SIG_CONTENT=$(cat "$LINUX_SIG")
            BUNDLE_NAME=$(basename "$LINUX_BUNDLE")
            PLATFORM_MAP["linux-x86_64"]="$(cat <<EOF
            "linux-x86_64": {
              "signature": "${SIG_CONTENT}",
              "url": "${BASE_URL}/${BUNDLE_NAME}"
            }
          EOF
            )"
            echo "Found Linux update bundle: ${BUNDLE_NAME}"
          else
            echo "::warning::No Linux update bundle found"
          fi

          # Windows: look for .nsis.zip and .nsis.zip.sig
          WIN_SIG=$(find artifacts -name "*.nsis.zip.sig" -type f | head -1)
          WIN_BUNDLE=$(find artifacts -name "*.nsis.zip" -not -name "*.sig" -type f | head -1)
          if [ -n "$WIN_SIG" ] && [ -n "$WIN_BUNDLE" ]; then
            SIG_CONTENT=$(cat "$WIN_SIG")
            BUNDLE_NAME=$(basename "$WIN_BUNDLE")
            PLATFORM_MAP["windows-x86_64"]="$(cat <<EOF
            "windows-x86_64": {
              "signature": "${SIG_CONTENT}",
              "url": "${BASE_URL}/${BUNDLE_NAME}"
            }
          EOF
            )"
            echo "Found Windows update bundle: ${BUNDLE_NAME}"
          else
            echo "::warning::No Windows update bundle found"
          fi

          # Build platforms JSON (only include platforms with bundles)
          PLATFORMS=""
          for platform in darwin-aarch64 linux-x86_64 windows-x86_64; do
            if [ -n "${PLATFORM_MAP[$platform]}" ]; then
              if [ -n "$PLATFORMS" ]; then
                PLATFORMS="${PLATFORMS},"
              fi
              PLATFORMS="${PLATFORMS}${PLATFORM_MAP[$platform]}"
            fi
          done

          if [ -z "$PLATFORMS" ]; then
            echo "::error::No update bundles found for any platform"
            exit 1
          fi

          # Write latest.json
          cat > latest.json <<EOF
          {
            "version": "${VERSION}",
            "notes": "See release notes for details",
            "pub_date": "${PUB_DATE}",
            "platforms": {
              ${PLATFORMS}
            }
          }
          EOF

          echo "Generated latest.json:"
          cat latest.json | jq .

      - name: Upload latest.json to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ------------------------------------------------------------------
  # GitHub Pages — deploy website on push to main/master
  # ------------------------------------------------------------------
  deploy-pages:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    needs: build
    permissions:
      contents: read
      pages: write
      id-token: write
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
