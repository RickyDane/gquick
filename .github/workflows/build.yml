name: Build

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]

env:
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: short

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            os_name: linux
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            os_name: windows
          - platform: macos-latest
            target: aarch64-apple-darwin
            os_name: macos-arm

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            src-tauri/target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      # ------------------------------------------------------------------
      # Platform-specific system dependencies
      # ------------------------------------------------------------------

      - name: Install Linux dependencies
        if: matrix.os_name == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libdbus-1-dev \
            libpipewire-0.3-dev \
            libwayland-dev \
            libegl-dev \
            libgbm-dev \
            libclang-dev \
            clang

      - name: Install macOS dependencies (ARM64)
        if: matrix.os_name == 'macos-arm'
        run: |
          brew install tesseract
          mkdir -p src-tauri/macos-bundle/Frameworks src-tauri/macos-bundle/tessdata

      - name: Install Windows dependencies
        if: matrix.os_name == 'windows'
        run: |
          echo "No additional system dependencies required for Windows"

      # ------------------------------------------------------------------
      # Build application
      # ------------------------------------------------------------------

      - name: Install frontend dependencies
        run: npm ci

      - name: Validate macOS signing certificate
        if: matrix.os_name == 'macos-arm'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          if [ -z "$APPLE_CERTIFICATE" ]; then
            echo "::warning::APPLE_CERTIFICATE is empty. Skipping code signing validation."
            echo "signing_available=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "$APPLE_CERTIFICATE" | base64 -d -o /tmp/certificate.p12
          if [ ! -s /tmp/certificate.p12 ]; then
            echo "::error::Decoded certificate is empty. Base64 string may be invalid."
            exit 1
          fi
          echo "Certificate decoded successfully ($(stat -f%z /tmp/certificate.p12) bytes)"

          # Try importing into a temporary keychain to verify password and content
          KEYCHAIN_PATH=/tmp/gquick-build.keychain
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"

          if ! security import /tmp/certificate.p12 -P "$APPLE_CERTIFICATE_PASSWORD" -k "$KEYCHAIN_PATH" -T /usr/bin/codesign -T /usr/bin/security; then
            echo "::error::Failed to import certificate. Common causes: wrong password, missing private key, or corrupted .p12 file."
            exit 1
          fi

          echo "Certificate imported successfully. Available identities:"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

          if [ -n "$APPLE_SIGNING_IDENTITY" ]; then
            if security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep -q "$APPLE_SIGNING_IDENTITY"; then
              echo "Signing identity '$APPLE_SIGNING_IDENTITY' found ✓"
            else
              echo "::warning::Signing identity '$APPLE_SIGNING_IDENTITY' not found in keychain."
            fi
          fi
          echo "signing_available=true" >> "$GITHUB_OUTPUT"
        id: validate_cert

      - name: Build Tauri app
        run: npm run tauri -- build --target ${{ matrix.target }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ matrix.os_name == 'macos-arm' && secrets.APPLE_CERTIFICATE || '' }}
          APPLE_CERTIFICATE_PASSWORD: ${{ matrix.os_name == 'macos-arm' && secrets.APPLE_CERTIFICATE_PASSWORD || '' }}
          APPLE_SIGNING_IDENTITY: ${{ matrix.os_name == 'macos-arm' && secrets.APPLE_SIGNING_IDENTITY || '' }}
          APPLE_ID: ${{ matrix.os_name == 'macos-arm' && secrets.APPLE_ID || '' }}
          APPLE_PASSWORD: ${{ matrix.os_name == 'macos-arm' && secrets.APPLE_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ matrix.os_name == 'macos-arm' && secrets.APPLE_TEAM_ID || '' }}

      # ------------------------------------------------------------------
      # Upload artifacts (CI builds)
      # ------------------------------------------------------------------

      - name: Upload build artifacts
        if: github.ref_type != 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: gquick-${{ matrix.os_name }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.app
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.deb
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.rpm
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage
          if-no-files-found: warn

      # ------------------------------------------------------------------
      # Release (tag builds only)
      # ------------------------------------------------------------------

      - name: Upload release assets
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.app
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.deb
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.rpm
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
